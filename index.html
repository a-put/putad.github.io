<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anton Putintsev, PhD</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' fill='none'><circle cx='8' cy='8' r='2.5' fill='%23333'/><circle cx='24' cy='7' r='2' fill='%23333'/><circle cx='16' cy='16' r='3' fill='%23222'/><circle cx='6' cy='24' r='2' fill='%23333'/><circle cx='26' cy='22' r='2.5' fill='%23333'/><line x1='8' y1='8' x2='16' y2='16' stroke='%23333' stroke-width='1.2' opacity='0.5'/><line x1='24' y1='7' x2='16' y2='16' stroke='%23333' stroke-width='1.2' opacity='0.5'/><line x1='6' y1='24' x2='16' y2='16' stroke='%23333' stroke-width='1.2' opacity='0.5'/><line x1='26' y1='22' x2='16' y2='16' stroke='%23333' stroke-width='1.2' opacity='0.5'/><line x1='6' y1='24' x2='8' y2='8' stroke='%23333' stroke-width='1' opacity='0.3'/><line x1='24' y1='7' x2='26' y2='22' stroke='%23333' stroke-width='1' opacity='0.3'/></svg>" />
  <!-- Anti-flash: must run before first paint -->
  <script>
    (function () {
      var t = localStorage.getItem('cv-theme');
      if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    }());
  </script>
  <link rel="preload" href="assets/avatar.jpg" as="image" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ── Header ────────────────────────────────────────────── -->
  <header class="py-10 px-6">
    <canvas id="header-canvas" aria-hidden="true"></canvas>
    <div style="max-width: 900px; margin: 0 auto; padding: 0 1.5rem;" class="flex items-center gap-6">
      <div id="avatar-frame" class="flex-shrink-0">
        <img id="avatar" src="assets/avatar.jpg" alt="Profile photo" class="object-cover" />
      </div>
      <div>
        <h1 id="header-name" class="font-bold"
          style="letter-spacing: -0.03em; color: var(--text-primary);"></h1>
        <p id="header-title" class="mt-1 text-sm" style="color: var(--text-secondary);"></p>
        <p id="header-meta" class="mt-0.5 text-sm" style="color: var(--text-tertiary);"></p>
        <div id="header-links" class="flex flex-wrap gap-3 mt-3"></div>
      </div>
    </div>
  </header>

  <!-- ── Body layout: sidebar + content ───────────────────── -->
  <div class="page-layout">

    <nav class="sidebar">
      <button class="tab-btn active" data-tab="about">About</button>
      <button class="tab-btn" data-tab="experience">Experience</button>
      <button class="tab-btn" data-tab="publications">Publications</button>
      <button class="tab-btn" data-tab="skills">Skills</button>
      <button class="tab-btn" data-tab="timeline">Timeline</button>
      <button class="tab-btn" data-tab="media">Media</button>
      <button class="tab-btn" data-tab="contact">Contact</button>
    </nav>

    <main>

      <!-- About -->
      <section id="tab-about" class="tab-section">
        <h2 class="section-title">About</h2>
        <div id="explainer-card"></div>
        <p id="about-text" class="text-sm leading-relaxed" style="color: var(--text-secondary); max-width: 60ch;"></p>

        <p class="subsection-label">Education</p>
        <div id="education-list" class="flex flex-col gap-3"></div>

      </section>

      <!-- Experience -->
      <section id="tab-experience" class="tab-section hidden">
        <h2 class="section-title">Experience</h2>
        <div id="experience-list" class="flex flex-col gap-4"></div>
      </section>

      <!-- Publications -->
      <section id="tab-publications" class="tab-section hidden">
        <h2 class="section-title">Publications</h2>
        <div id="pub-profiles" class="flex flex-wrap gap-3 mb-5"></div>
        <p class="text-xs mb-5" style="color: var(--text-tertiary);">* co-first author &nbsp;·&nbsp; <sup>†</sup>
          corresponding author</p>
        <div id="publications-list" class="flex flex-col gap-3"></div>
      </section>

      <!-- Skills -->
      <section id="tab-skills" class="tab-section hidden">
        <h2 class="section-title">Skills</h2>
        <div id="skills-graph-wrap">
          <canvas id="skills-graph" aria-label="Interactive skills network graph"></canvas>
        </div>
      </section>

      <!-- Timeline -->
      <section id="tab-timeline" class="tab-section hidden">
        <h2 class="section-title">Research Timeline</h2>
        <div id="timeline-list" class="timeline"></div>
      </section>

      <!-- Media -->
      <section id="tab-media" class="tab-section hidden">
        <h2 class="section-title">Media</h2>
        <div id="media-list"></div>
      </section>

      <!-- Contact -->
      <section id="tab-contact" class="tab-section hidden">
        <h2 class="section-title">Contact</h2>
        <p class="text-sm mb-6" style="color: var(--text-secondary);">Drop me a message and I'll get back to you.</p>
        <form id="contact-form" class="flex flex-col gap-4" style="max-width: 480px;">
          <!-- Honeypot: bots fill this, humans don't -->
          <input type="checkbox" name="botcheck" style="display:none;" tabindex="-1" autocomplete="off" />
          <div>
            <label class="form-label" for="f-name">Name</label>
            <input id="f-name" name="name" type="text" required class="form-input" autocomplete="name" />
          </div>
          <div>
            <label class="form-label" for="f-email">Email</label>
            <input id="f-email" name="email" type="email" required class="form-input" autocomplete="email" />
          </div>
          <div>
            <label class="form-label" for="f-message">Message</label>
            <textarea id="f-message" name="message" rows="5" required class="form-input"
              style="resize: vertical;"></textarea>
          </div>
          <div>
            <button type="submit" class="submit-btn" id="submit-btn">Send Message</button>
          </div>
          <p id="form-status" class="text-sm hidden"></p>
        </form>
        <div id="form-success" class="hidden" style="display:none; flex-direction:column; align-items:center; justify-content:center; padding: 3rem 0; gap: 1rem;">
          <svg viewBox="0 0 80 80" style="width:80px;height:80px;" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="40" cy="40" r="36" stroke="var(--border)" stroke-width="3"/>
            <path d="M24 41l11 11 21-22" stroke="var(--text-tertiary)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <p style="color: var(--text-tertiary); font-size: 0.9rem;">Message sent</p>
        </form>
      </section>

    </main>

  </div><!-- /.page-layout -->

  <footer class="text-center py-10" style="font-size: 0.75rem; color: var(--text-tertiary);">
    <span id="footer-name"></span>
  </footer>

  <!-- Publication explainer modal -->
  <div id="pub-modal" aria-modal="true" role="dialog">
    <button id="pub-modal-close" aria-label="Close">&times;</button>
    <div id="pub-modal-card" class="pub-modal-card">
      <div class="pub-modal-text-panel">
        <span id="pm-journal" class="pub-modal-journal-label"></span>
        <div id="pm-title" class="pub-modal-title"></div>
        <p id="pm-layman" class="pub-modal-layman"></p>
      </div>
      <div id="pm-img-wrap" class="pub-modal-img-wrap">
        <img id="pm-img" src="" alt="Publication illustration" />
      </div>
    </div>
  </div>

  <!-- Avatar lightbox -->
  <div id="avatar-lightbox" role="dialog" aria-modal="true" aria-label="Profile photo enlarged">
    <div class="lb-backdrop"></div>
    <img class="lb-img" src="assets/avatar.jpg" alt="Profile photo enlarged" />
  </div>

  <button id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
    <span id="theme-knob">
      <!-- Sun icon -->
      <svg id="icon-sun" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
        <circle cx="10" cy="10" r="3.5"/>
        <rect x="9" y="1"   width="2" height="3" rx="1" transform="rotate(0   10 10)"/>
        <rect x="9" y="1"   width="2" height="3" rx="1" transform="rotate(45  10 10)"/>
        <rect x="9" y="1"   width="2" height="3" rx="1" transform="rotate(90  10 10)"/>
        <rect x="9" y="1"   width="2" height="3" rx="1" transform="rotate(135 10 10)"/>
        <rect x="9" y="1"   width="2" height="3" rx="1" transform="rotate(180 10 10)"/>
        <rect x="9" y="1"   width="2" height="3" rx="1" transform="rotate(225 10 10)"/>
        <rect x="9" y="1"   width="2" height="3" rx="1" transform="rotate(270 10 10)"/>
        <rect x="9" y="1"   width="2" height="3" rx="1" transform="rotate(315 10 10)"/>
      </svg>
      <!-- Moon icon -->
      <svg id="icon-moon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </span>
  </button>

  <script src="main.js?v=5"></script>
  <script>
    (function () {
      const lb = document.getElementById('avatar-lightbox');
      const lbImg = lb.querySelector('.lb-img');
      const avatar = document.getElementById('avatar');
      const frame = document.getElementById('avatar-frame');
      let isOpen = false;
      let isAnimating = false;

      function openLightbox() {
        if (isOpen || isAnimating) return;
        isAnimating = true;

        // First: measure avatar's current position
        const rect = avatar.getBoundingClientRect();
        const style = getComputedStyle(avatar);
        const br = parseFloat(style.borderRadius) || 14;

        // Position the lightbox image exactly over the avatar
        lbImg.style.top = rect.top + 'px';
        lbImg.style.left = rect.left + 'px';
        lbImg.style.width = rect.width + 'px';
        lbImg.style.height = rect.height + 'px';
        lbImg.style.borderRadius = br + 'px';

        // Hide original avatar, show lightbox (no transition yet)
        frame.classList.add('lb-active');
        lb.classList.add('open');

        // Last: compute target position (centered, enlarged)
        const targetSize = Math.min(window.innerWidth * 0.7, window.innerHeight * 0.7, 420);
        const targetTop = (window.innerHeight - targetSize) / 2;
        const targetLeft = (window.innerWidth - targetSize) / 2;

        // Invert + Play: enable transitions then move to target
        requestAnimationFrame(() => {
          lb.classList.add('animating');
          requestAnimationFrame(() => {
            lbImg.style.top = targetTop + 'px';
            lbImg.style.left = targetLeft + 'px';
            lbImg.style.width = targetSize + 'px';
            lbImg.style.height = targetSize + 'px';
            lbImg.style.borderRadius = '22px';
            isOpen = true;
            isAnimating = false;
          });
        });
      }

      function closeLightbox() {
        if (!isOpen || isAnimating) return;
        isAnimating = true;

        // Animate back to avatar's current position
        const rect = avatar.getBoundingClientRect();
        const style = getComputedStyle(avatar);
        const br = parseFloat(style.borderRadius) || 14;

        lbImg.style.top = rect.top + 'px';
        lbImg.style.left = rect.left + 'px';
        lbImg.style.width = rect.width + 'px';
        lbImg.style.height = rect.height + 'px';
        lbImg.style.borderRadius = br + 'px';

        lb.classList.remove('open');

        const cleanup = () => {
          lb.classList.remove('animating');
          frame.classList.remove('lb-active');
          isOpen = false;
          isAnimating = false;
        };
        lbImg.addEventListener('transitionend', function done(e) {
          if (e.propertyName !== 'width') return;
          lbImg.removeEventListener('transitionend', done);
          clearTimeout(fallback);
          cleanup();
        });
        const fallback = setTimeout(cleanup, 500);
      }

      document.getElementById('avatar-frame').addEventListener('click', openLightbox);
      lb.addEventListener('click', closeLightbox);
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
    })();
  </script>
</body>

</html>
